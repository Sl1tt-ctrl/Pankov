<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="container">

  <header>
    <nav class="navbar">
      <div class="nav-left">
        <div class="logo">
          <img src="./img/logo.png" alt="Xbox" />
        </div>
        <ul class="nav-links">
          <li><a href="#">Games</a></li>
          <li><a href="#">Consoles</a></li>
          <li><a href="#">Community</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <div class="search-box">
          <input type="text" placeholder="Search" />
        </div>
        <div class="user-menu">
          <span class="user-icon"><img src="./img/user.png" alt="user" /></span>
          <span>My Xbox</span>
        </div>
      </div>
    </nav>
  </header>
  
  <main>
    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>Call of Duty: WWII</h1>
        <p class="release-date">Released on: 23/11/2017</p>
        <div class="hero-buttons">
          <button class="btn btn-green">Order Now</button>
          <button class="btn btn-green">More Games</button>
        </div>
      </div>

      <!-- Game Title Section -->
    <section class="game-title-section">
      <h2>Call of Duty: WWII</h2>
      <div class="title-buttons">
        <button class="btn btn-green">Order Now</button>
        <button class="btn btn-gray">Technical Specifications</button>
      </div>
    </section>
    </section>

  </main>

  <footer></footer>
  
</body>
</html>
